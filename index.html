<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Owllicious Studios</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Inter:wght@300;400&display=swap" rel="stylesheet">

<style>

html, body {
  margin: 0;
  padding: 0;
  min-height: 100%;
  font-family: 'Inter', sans-serif;
  color: white;
  background: black;
}

body {
  position: relative;
  overflow-x: hidden;
  overflow-y: auto;
}

.video-bg {
  position: fixed;
  inset: 0;
  width: 100%;
  height: 100%;
  object-fit: cover;
  z-index: 0;
  pointer-events: none;
}

.overlay {
  position: fixed;
  inset: 0;
  background: linear-gradient(
    rgba(0,0,0,0.45),
    rgba(0,0,0,0.35)
  );
  z-index: 1;
  pointer-events: none;
}

.content {
  position: relative;
  z-index: 2;
  min-height: 100vh;
  min-height: 100dvh;
  display: flex;
  justify-content: center;
  align-items: center;
  text-align: center;
  padding: 32px 20px;
  box-sizing: border-box;
}

.content-inner {
  width: min(650px, 100%);
  backdrop-filter: blur(6px);
  -webkit-backdrop-filter: blur(6px);
  background: rgba(0, 0, 0, 0.6);
  padding: 20px 20px;
  border-radius: 64px;
  box-sizing: border-box;
}

h1 {
  font-family: 'Playfair Display', serif;
  font-size: 3rem;
  letter-spacing: 0.08em;
  margin: 0 0 10px 0;
  text-shadow: 0 2px 10px rgba(0, 0, 0, 0.6);
}

hr {
  width: 60px;
  border: none;
  border-top: 2px solid rgba(255, 255, 255, 0.7);
  margin: 20px auto 30px auto;
}

p {
  font-size: 1.1rem;
  line-height: 1.7;
  font-weight: 300;
  text-shadow: 0 2px 8px rgba(0, 0, 0, 0.7);
  margin: 0;
}

@media (max-width: 700px) {
  .content {
    align-items: flex-start;
    padding: 24px 16px 32px;
  }

  .content-inner {
    margin: 24px 0;
    padding: 28px 22px;
    border-radius: 20px;
  }

  h1 {
    font-size: 2.2rem;
    letter-spacing: 0.05em;
  }

  p {
    font-size: 1rem;
    line-height: 1.6;
  }
}
</style>
</head>

<body>

<video class="video-bg" autoplay muted loop playsinline>
  <source src="bg.mp4" type="video/mp4">
</video>

<!-- This dims the video, undesired at the moment. -->
<!-- <div class="overlay"></div> -->

<div class="content">
  <div class="content-inner">

    <h1>Owllicious Studios</h1>

    <hr>

    <p>
      Games, interactive art, and strange experiments.<br>
      A small studio exploring systems, simulation, and worlds that feel alive.
    </p>

    <hr>

    <p>
      More information about our first project coming soon!
    </p>

  </div>
</div>

<script>
window.addEventListener("load", async () => {
  const video = document.querySelector(".video-bg");
  if (!video) return;

  video.muted = true;

  try {
    await video.play();
  } catch (err) {
    console.error("Autoplay failed:", err);
  }
});
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Owllicious Studios</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Inter:wght@300;400&display=swap" rel="stylesheet">

<style>

html, body {
  margin: 0;
  padding: 0;
  height: 100%;
  overflow: hidden;
  font-family: 'Inter', sans-serif;
  color: white;
}

.video-bg {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  object-fit: cover;
  z-index: 0;
}

.overlay {
  position: fixed;
  inset: 0;
  background: linear-gradient(
    rgba(0,0,0,0.45),
    rgba(0,0,0,0.35)
  );
  z-index: 1;
}

.content {
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  text-align: center;
  padding: 40px;
  z-index: 2;
}

.content-inner {
  max-width: 720px;
  backdrop-filter: blur(6px);
  background: rgba(0,0,0,0.6);
  padding: 40px 50px;
  border-radius: 10px;
}

h1 {
  font-family: 'Playfair Display', serif;
  font-size: 3rem;
  letter-spacing: 0.08em;
  margin: 0 0 10px 0;
  text-shadow: 0 2px 10px rgba(0,0,0,0.6);
}

hr {
  width: 60px;
  border: none;
  border-top: 2px solid rgba(255,255,255,0.7);
  margin: 20px auto 30px auto;
}

p {
  font-size: 1.1rem;
  line-height: 1.7;
  font-weight: 300;
  text-shadow: 0 2px 8px rgba(0,0,0,0.7);
}

</style>
</head>

<body>

<video class="video-bg" autoplay muted loop playsinline>
  <source src="bg.mp4" type="video/mp4">
</video>

<!-- This dims the video, undesired at the moment. -->
<!-- <div class="overlay"></div> -->

<div class="content">
  <div class="content-inner">

    <h1>Owllicious Studios</h1>

    <hr>

    <p>
      Games, interactive art, and strange experiments.<br>
      A small studio exploring systems, simulation, and worlds that feel alive.
    </p>

    <hr>

    <p>
      More information about our first project coming soon!
    </p>

  </div>
</div>

</body>
</html>
